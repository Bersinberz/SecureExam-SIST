<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Exam Browser</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    form {
      margin: 20px auto;
      width: 300px;
    }
    input, button {
      margin: 5px 0;
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Safe Exam Browser</h1>
  <p>Welcome! Please log in to start your exam.</p>
  <form id="login-form">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Start Exam</button>
  </form>
  <div id="exam-content" style="display: none;">
    <h2>Exam Questions</h2>
    <p>Question 1: What is 2 + 2?</p>
    <input type="text" placeholder="Your Answer">
    <button onclick="submitExam()">Submit</button>
  </div>
  <script>
    const loginForm = document.getElementById('login-form');
    const examContent = document.getElementById('exam-content');
    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();
      loginForm.style.display = 'none';
      examContent.style.display = 'block';
    });
    function submitExam() {
      alert('Exam submitted successfully!');
      window.close(); // Close the app after submission
    }
    document.addEventListener('contextmenu', (event) => event.preventDefault())
  </script>
</body>
</html>
