<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Code Runner</title>
    <style>
        /* General Styles */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f5f5, #d3d3d3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Styles */
        header {
            width: 100%;
            background-color: #831238;
            color: white;
            padding: 2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header .logo {
            display: flex;
            align-items: center;
            padding: 0px 6rem;
        }

        header span {
            font-weight: bold;
            font-size: 1.5rem;
            padding: 1rem 4rem;
        }

        header .logo img {
            width: 19rem;
            height: 4rem;
        }

        header nav {
            display: flex;
            gap: 1.5rem;
        }

        header nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.3s;
        }

        header nav a:hover {
            color: #831238;
        }

        /* Controls Section */
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #d3d3d3;
            color: white;
            width: 100%;
        }

        #controls select, #controls button {
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 10px;
            background-color: #9E1C3F;
            color: white;
            border: none;
            transition: background 0.3s, transform 0.2s;
        }

        #controls button {
            background-color: #9E1C3F;
            cursor: pointer;
        }

        #controls button:hover {
            background-color: #831238;
            transform: scale(1.05);
        }

        #controls select:hover {
            background-color: #831238;
        }

        /* Editor Styling */
        #editor-container {
            width: 80%;
            height: 60vh;
            margin-top: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* Output Styling */
        #output-container {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            margin-top: 30px;
            font-family: monospace;
            border-radius: 10px;
            width: 80%;
            margin-bottom: 50px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* Light Theme Adjustments */
        .light-theme {
            background-color: white;
            color: #000;
        }

        .light-theme header {
            background-color: #831238;
            color: white;
        }

        .light-theme #controls {
            background-color: #f4f4f4;
            color: #282c34;
        }

        .light-theme #controls select, .light-theme #controls button {
            background-color: #9E1C3F;
            color: white;
        }

        .light-theme #output-container {
            background-color: #ecf0f1;
            color: #333;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            #controls {
                flex-direction: column;
                align-items: flex-start;
            }

            #editor-container {
                width: 90%;
            }

            #output-container {
                width: 90%;
            }
        }
    </style>
    <script src="https://unpkg.com/monaco-editor/min/vs/loader.js"></script>
</head>
<body>
    <!-- Header Section -->
    <header>
        <div class="logo">
            <img src="Asserts/recruitment-at-sathyabama-institute-of-science-and-technology.png" alt="Sathyabama">
        </div>
        <span>SecureExam-SIST</span>
    </header>

    <div id="controls">
        <select id="language-select">
            <option value="javascript" selected>JavaScript</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="c">C</option>
            <option value="cpp">C++</option>
        </select>
        <button id="run-button">Run Code</button>
        <button id="theme-toggle">Switch to Light Theme</button>
    </div>

    <div id="editor-container"></div>
    <div id="output-container">Output will appear here...</div>

    <script>
        let editor;
        let currentTheme = 'vs-dark';

        // Configure Monaco Editor Loader
        require.config({ paths: { vs: 'https://unpkg.com/monaco-editor/min/vs' } });

        // Load and Initialize Monaco Editor
        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: `// Write your code here\nconsole.log('Hello, world!');`,
                language: 'javascript',
                theme: currentTheme,
                automaticLayout: true
            });
        });

        // Language Selector
        const languageSelect = document.getElementById('language-select');
        languageSelect.addEventListener('change', () => {
            const newLanguage = languageSelect.value;
            monaco.editor.setModelLanguage(editor.getModel(), newLanguage);
            editor.setValue(
                newLanguage === 'python'
                    ? `# Write your Python code here\nprint("Hello, Python!")`
                    : newLanguage === 'java'
                    ? `// Write your Java code here\npublic class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello, Java!");\n    }\n}`
                    : newLanguage === 'c'
                    ? `// Write your C code here\n#include <stdio.h>\nint main() {\n    printf("Hello, C!\\n");\n    return 0;\n}`
                    : newLanguage === 'cpp'
                    ? `// Write your C++ code here\n#include <iostream>\nusing namespace std;\nint main() {\n    cout << "Hello, C++!" << endl;\n    return 0;\n}`
                    : `// Write your ${newLanguage} code here\nconsole.log('Hello, world!');`
            );
        });

        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            currentTheme = currentTheme === 'vs-dark' ? 'vs-light' : 'vs-dark';
            const newThemeText = currentTheme === 'vs-dark' ? 'Switch to Light Theme' : 'Switch to Dark Theme';
            monaco.editor.setTheme(currentTheme);
            themeToggle.textContent = newThemeText;
            document.body.classList.toggle('light-theme');
        });

        // Run Code Button
        const runButton = document.getElementById('run-button');
        const outputContainer = document.getElementById('output-container');

        runButton.addEventListener('click', async () => {
            const code = editor.getValue();
            const language = languageSelect.value;
            outputContainer.textContent = 'Running...';

            try {
                // Make an API call to the backend server
                const response = await fetch('http://localhost:5000/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language, code }),
                });
                const result = await response.json();
                outputContainer.textContent = result.output;
            } catch (error) {
                outputContainer.textContent = `Error: ${error.message}`;
            }
        });
    </script>
</body>
</html>
