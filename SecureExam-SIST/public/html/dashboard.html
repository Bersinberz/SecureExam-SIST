<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Dashboard</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="../images/recruitment-at-sathyabama-institute-of-science-and-technology.png" alt="Sathyabama">
    </div>
    <span>SecureExam-SIST - Dashboard</span>
  </header>

  <main>
    <section id="exam-settings">
      <h2>Exam Details</h2>
      <form id="exam-form">
        <label for="exam-name">Exam Name:</label>
        <input type="text" id="exam-name" name="exam-name" autocomplete="off" required aria-label="Enter the exam name">

        <label for="exam-time">Exam Time (hours and minutes):</label>
        <div class="time-picker">
          <label for="hours">Hours:</label>
          <select id="hours" aria-label="Select hours for the exam time">
            <option value="" disabled selected>--</option>
          </select>

          <label for="minutes">Minutes:</label>
          <select id="minutes" aria-label="Select minutes for the exam time">
            <option value="" disabled selected>--</option>
          </select>
        </div>

        <div class="exam-section">
          <div class="dropdown-container">
            <div>
              <label for="department-dropdown">Department:</label>
              <select id="department-select" name="department" aria-label="Select the department">
                <option value="" disabled selected>Select department</option>
                <option value="AI">AI</option>
                <option value="AIML">AIML</option>
                <option value="AIDS">AIDS</option>
                <option value="AIR">AIR</option>
                <option value="CS">CS</option>
                <option value="BCT">BCT</option>
                <option value="IOT">IOT</option>
                <option value="CSE">CSE</option>
              </select>
            </div>

            <div>
              <label for="section-dropdown">Class:</label>
              <select id="class-select" name="section" aria-label="Select the class">
                <option value="" disabled selected>Select class</option>
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="A3">A3</option>
                <option value="A4">A4</option>
                <option value="A5">A5</option>
                <option value="A6">A6</option>
              </select>
            </div>
          </div>
        </div>
      </form>
    </section>

    <section id="questions-section">
      <h2>Questions</h2>
      <form class="form" id="file-upload-form">
        <span class="form-title">Upload file</span>
        <label for="file-input" class="drop-container" aria-label="Drag or select file to upload">
          <span class="drop-title">Drop files here</span> or
          <input type="file" id="file-input" required aria-label="Choose file to upload">
        </label>
      </form>

      <div id="loader" class="loader" style="display: none;">
        Uploading...
      </div>

      <div id="upload-success-message">File uploaded successfully!</div>

      <button class="boton-elegante" id="remove-file-button" style="display: none;" disabled aria-label="Remove uploaded file">Remove file</button>

      <div class="countdown" id="countdown"></div>
    </section>

    <button id="start-button" aria-label="Start exam">Start Exam</button>
  </main>

  <script src="https://code.jquery.com/jquery-1.11.0.min.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
