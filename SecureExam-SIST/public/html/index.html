<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SecureExam-SIST</title>
  <link rel="stylesheet" href="../css/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header Section -->
  <header class="header">
    <div class="logo">
      <img src="../images/recruitment-at-sathyabama-institute-of-science-and-technology.png" alt="Sathyabama">
    </div>
    <span>SecureExam-SIST</span>
  </header>

  <!-- Login Form Section -->
  <div class="login-container">
    <img src="../images/images-removebg-preview.png" alt="Sathyabama logo" style="width: 30%;">

    <!-- User Type Dropdown -->
    <select id="userType" required>
      <option value="" disabled selected>Select User Type</option>
      <option value="student">Student</option>
      <option value="staff">Staff</option>
    </select>

    <!-- Form for student or staff login -->
    <form id="loginForm">
      <div id="studentForm" class="login-fields" style="display: none;">
        <input type="text" id="registerNumber" placeholder="Register Number" required autocomplete="off">
      </div>

      <div id="staffForm" class="login-fields" style="display: none;">
        <input type="email" id="email" placeholder="Email" required autocomplete="off">
      </div>

      <input type="password" id="password" placeholder="Enter Password" required>
      <button type="submit">Login</button>
    </form>
  </div>

  <!-- Loading Spinner -->
  <div id="loadingSpinner" class="spinner-container" style="display: none;">
    <div class="loader"></div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <p>Login Successful!</p>
    </div>
  </div>

  <!-- Error Modal -->
  <div id="errorModal" class="modal">
    <div class="modal-content">
      <p>Login Failed! Try again.</p>
    </div>
  </div>

  <script src="../js/index.js"></script>
</body>
</html>
